<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    :root {
      --text: #111827;
      --muted: #647184;
      --muted-2: #87919c;
      --line: #d6dde6;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background: transparent;
      color: var(--text);
      font-family: "Source Sans 3", "Source Sans Pro", sans-serif;
    }

    .research-table-shell {
      max-height: 540px;
      overflow: auto;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
      border: 1px solid var(--line);
      background: #ffffff;
      scrollbar-gutter: stable;
    }

    .research-table {
      width: max-content;
      min-width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      color: var(--text);
      font-size: 12px;
      font-variant-numeric: tabular-nums;
    }

    .research-table th,
    .research-table td {
      height: 36px;
      padding: 0 10px;
      border: 0;
      border-bottom: 1px solid #edf0f4;
      background: #ffffff;
      text-align: right;
      white-space: nowrap;
    }

    .research-table th {
      position: sticky;
      top: 0;
      z-index: 8;
      height: 38px;
      background: #eef2f6;
      color: #647184;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .research-table tbody tr:hover td {
      background: #f7fafc;
    }

    .research-table .align-left {
      text-align: left;
    }

    .research-table .sticky-game {
      position: sticky;
      left: 0;
      z-index: 5;
      width: 92px;
      min-width: 92px;
      text-align: center;
      box-shadow: 1px 0 0 #dfe5ec;
    }

    .research-table .sticky-player {
      position: sticky;
      left: 92px;
      z-index: 5;
      width: 198px;
      min-width: 198px;
      text-align: left;
      box-shadow: 1px 0 0 #dfe5ec;
    }

    .research-table th.sticky-game,
    .research-table th.sticky-player {
      z-index: 10;
      background: #e8edf3;
    }

    .research-table .sticky-grade {
      position: sticky;
      right: 0;
      z-index: 6;
      min-width: 108px;
      background: #ffffff;
      box-shadow: -1px 0 0 #dfe5ec;
    }

    .research-table th.sticky-grade {
      z-index: 11;
      background: #e8edf3;
    }

    .research-table tbody tr:hover td.sticky-grade {
      background: #f7fafc;
    }

    .research-sort-button {
      width: 100%;
      height: 38px;
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      font: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
    }

    .align-left .research-sort-button {
      justify-content: flex-start;
    }

    .research-sort-button:hover,
    .research-sort-button:focus-visible {
      color: #245f96;
      outline: none;
    }

    .research-sort-indicator {
      width: 9px;
      color: #245f96;
      font-size: 10px;
      line-height: 1;
    }

    th[aria-sort="ascending"] .research-sort-indicator::after {
      content: "\2191";
    }

    th[aria-sort="descending"] .research-sort-indicator::after {
      content: "\2193";
    }

    .research-table th.is-active-sort {
      background: #e2ebf3;
      color: #173f67;
      box-shadow: inset 0 -2px 0 #9db8cf;
    }

    .research-table td.is-active-sort {
      background: #f4f8fb;
      box-shadow:
        inset 1px 0 0 rgba(157, 184, 207, 0.42),
        inset -1px 0 0 rgba(157, 184, 207, 0.42);
    }

    .research-table tbody tr:hover td.is-active-sort {
      background: #edf4fa;
    }

    .research-table th.sticky-game.is-active-sort,
    .research-table th.sticky-player.is-active-sort,
    .research-table th.sticky-grade.is-active-sort {
      background: #dbe6f0;
    }

    .research-table td.sticky-game.is-active-sort,
    .research-table td.sticky-player.is-active-sort,
    .research-table td.sticky-grade.is-active-sort {
      background: #f1f6fa;
    }

    .research-table tbody tr:hover td.sticky-game.is-active-sort,
    .research-table tbody tr:hover td.sticky-player.is-active-sort,
    .research-table tbody tr:hover td.sticky-grade.is-active-sort {
      background: #eaf2f8;
    }

    .research-game {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
    }

    .research-game img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .research-log-opponent {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #245f96;
      font-weight: 700;
    }

    .research-log-opponent img {
      width: 24px;
      height: 24px;
      object-fit: contain;
    }

    .stats-identity-img {
      width: 24px;
      height: 24px;
      flex: 0 0 auto;
      object-fit: contain;
    }

    .stats-headshot {
      border: 1px solid #d8dee6;
      border-radius: 50%;
      background: #f3f5f7;
      object-fit: cover;
    }

    .game-log-table-shell {
      max-height: 540px;
    }

    .game-log-table .sticky-game {
      text-align: center;
      font-weight: 600;
    }

    .research-at {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 700;
    }

    .research-player-link {
      margin: 0;
      padding: 0;
      border: 0;
      background: transparent;
      color: #245f96;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      max-width: calc(100% - 24px);
      font: inherit;
      font-weight: 700;
      text-align: left;
      text-decoration: none;
    }

    .research-player-identity {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .research-player-identity span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .research-headshot {
      width: 28px;
      height: 28px;
      flex: 0 0 auto;
      border: 1px solid #d8dee6;
      border-radius: 50%;
      background: #f3f5f7;
      object-fit: cover;
    }

    .research-player-link:hover,
    .research-player-link:focus-visible {
      color: #123f69;
      text-decoration: underline;
      outline: none;
    }

    .research-injury-badge {
      position: absolute;
      top: 3px;
      right: 4px;
      z-index: 12;
      min-width: 21px;
      padding: 1px 3px;
      border: 1px solid #dbc94a;
      border-radius: 2px;
      background: #fff8a8;
      color: #4a4315;
      font-size: 8px;
      font-weight: 800;
      line-height: 12px;
      text-align: center;
      text-transform: lowercase;
      cursor: help;
    }

    .research-injury-badge::after {
      content: attr(data-tooltip);
      position: absolute;
      top: calc(100% + 5px);
      right: 0;
      z-index: 30;
      display: none;
      width: 230px;
      padding: 8px 10px;
      border-radius: 4px;
      background: #26303a;
      color: #ffffff;
      font-size: 10px;
      font-weight: 600;
      line-height: 1.35;
      text-align: left;
      text-transform: none;
      white-space: normal;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.22);
    }

    .research-injury-badge:hover::after,
    .research-injury-badge:focus::after {
      display: block;
    }

    .research-injury-badge:focus {
      outline: 2px solid #245f96;
      outline-offset: 1px;
    }

    .research-table .sticky-player:focus-within,
    .research-table .sticky-player:has(.research-injury-badge:hover) {
      z-index: 25;
    }

    .research-weather {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-width: 86px;
    }

    .research-weather .weather-svg {
      width: 17px;
      height: 17px;
    }

    .research-grade,
    .research-edge {
      display: inline-block;
      padding: 3px 7px;
      border-radius: 2px;
      font-size: 10px;
      font-weight: 700;
    }

    .research-grade.good,
    .research-edge.hitter {
      color: #247a4d;
      background: #edf8f2;
    }

    .research-grade.neutral {
      color: #9a6810;
      background: #fff8e8;
    }

    .research-grade.avoid,
    .research-edge.pitcher {
      color: #b43b3b;
      background: #fff0f0;
    }

    .research-grade.sample {
      color: #3f6fa8;
      background: #eef5ff;
    }

    .research-grade.none,
    .research-edge.neutral {
      color: #687384;
      background: #f2f4f7;
    }

    .leaderboard-shell {
      max-height: 540px;
      overflow: auto;
      border: 1px solid var(--line);
      background: #ffffff;
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 42px 44px minmax(145px, 1fr) minmax(100px, 1.2fr) 74px 88px;
      align-items: center;
      gap: 10px;
      min-height: 58px;
      padding: 9px 12px;
      border-bottom: 1px solid #edf0f4;
    }

    .leaderboard-row:last-child {
      border-bottom: 0;
    }

    .leaderboard-rank {
      color: var(--muted-2);
      font-size: 12px;
      font-weight: 800;
      text-align: center;
    }

    .leaderboard-headshot {
      width: 36px;
      height: 36px;
      border: 1px solid #d8dee6;
      border-radius: 50%;
      background: #f3f5f7;
      object-fit: cover;
    }

    .leaderboard-name {
      min-width: 0;
    }

    .leaderboard-name strong,
    .leaderboard-name span {
      display: block;
    }

    .leaderboard-name strong {
      overflow: hidden;
      color: var(--text);
      font-size: 13px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .leaderboard-name span {
      color: var(--muted);
      font-size: 11px;
    }

    .leaderboard-bar-track {
      height: 8px;
      background: #edf1f5;
      overflow: hidden;
    }

    .leaderboard-bar-fill {
      display: block;
      height: 8px;
      background: #245f96;
    }

    .leaderboard-count {
      color: var(--text);
      font-size: 22px;
      font-weight: 800;
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .live-chip {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 2px 6px;
      border: 1px solid #d2dae4;
      background: #f7fafc;
      color: #526171;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .live-chip.hot {
      border-color: #a5d6b7;
      background: #edf8f2;
      color: #247a4d;
    }

    .live-chip.ended {
      border-color: #e2b8b8;
      background: #fff0f0;
      color: #b43b3b;
    }

    .player-card-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .roster-player-card-grid {
      max-height: 720px;
      overflow: auto;
      padding-right: 4px;
    }

    .player-card {
      width: 100%;
      min-height: 210px;
      padding: 14px;
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .player-card:hover,
    .player-card:focus-visible {
      border-color: #8fb4d6;
      background: #f7fafc;
      outline: none;
    }

    .player-card img {
      display: block;
      width: 88px;
      height: 88px;
      margin: 0 auto 10px;
      border: 1px solid #d8dee6;
      border-radius: 50%;
      background: #f3f5f7;
      object-fit: cover;
    }

    .player-card-rank,
    .player-card-name,
    .player-card-team {
      display: block;
    }

    .player-card-rank {
      color: var(--muted-2);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .player-card-name {
      margin-top: 4px;
      color: #06172b;
      font-size: 15px;
      font-weight: 800;
    }

    .player-card-team {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
    }

    @media (max-width: 680px) {
      .research-table-shell {
        max-height: 460px;
        scrollbar-gutter: auto;
      }

      .research-table {
        font-size: 10.5px;
      }

      .research-table th,
      .research-table td {
        height: 32px;
        padding: 0 5px;
      }

      .research-table th {
        height: 34px;
        font-size: 9px;
      }

      .research-sort-button {
        height: 34px;
        gap: 2px;
      }

      .research-table .sticky-game {
        width: 54px;
        min-width: 54px;
      }

      .research-table .sticky-player {
        left: 54px;
        width: 126px;
        min-width: 126px;
      }

      .research-table th:not(.sticky-game):not(.sticky-player):not(.sticky-grade) {
        min-width: 44px !important;
      }

      .research-table th.align-left:not(.sticky-game):not(.sticky-player):not(.sticky-grade) {
        min-width: 82px !important;
      }

      .research-table .sticky-grade {
        right: auto;
        min-width: 82px;
        box-shadow: none;
      }

      .research-table td.sticky-grade {
        position: static;
      }

      .research-table th.sticky-grade {
        position: sticky;
        top: 0;
        z-index: 8;
      }

      .research-injury-badge::after {
        right: -2px;
        width: 205px;
      }

      .leaderboard-row {
        grid-template-columns: 34px 40px minmax(0, 1fr) 58px;
      }

      .leaderboard-row .leaderboard-bar-track,
      .leaderboard-row .live-chip {
        display: none;
      }

      .player-card-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .research-game {
        gap: 2px;
      }

      .research-game img {
        width: 18px;
        height: 18px;
      }

      .research-log-opponent img {
        width: 18px;
        height: 18px;
      }

      .research-at {
        font-size: 9px;
      }

      .research-player-link {
        max-width: calc(100% - 18px);
      }

      .research-player-identity {
        gap: 5px;
      }

      .research-headshot,
      .stats-headshot,
      .stats-identity-img {
        width: 22px;
        height: 22px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script>
    const root = document.getElementById("root");
    let activeSort = null;
    let requestedFrameHeight = 542;
    let useFullMobileHeight = false;

    function sendMessage(type, payload = {}) {
      window.parent.postMessage(
        {
          isStreamlitMessage: true,
          type,
          ...payload,
        },
        "*",
      );
    }

    function setFrameHeight(requestedHeight) {
      const frameHeight = window.innerWidth <= 680 && !useFullMobileHeight
        ? Math.min(502, requestedHeight)
        : requestedHeight;
      sendMessage("streamlit:setFrameHeight", { height: frameHeight });
    }

    function compareRows(rowA, rowB, columnIndex, direction) {
      const cellA = rowA.children[columnIndex];
      const cellB = rowB.children[columnIndex];
      const kindA = cellA?.dataset.sortKind || "missing";
      const kindB = cellB?.dataset.sortKind || "missing";

      if (kindA === "missing" && kindB !== "missing") return 1;
      if (kindB === "missing" && kindA !== "missing") return -1;
      if (kindA === "missing" && kindB === "missing") return 0;

      const valueA = cellA.dataset.sortValue || "";
      const valueB = cellB.dataset.sortValue || "";
      let comparison;
      if (kindA === "number" && kindB === "number") {
        comparison = Number(valueA) - Number(valueB);
      } else {
        comparison = valueA.localeCompare(valueB, undefined, {
          numeric: true,
          sensitivity: "base",
        });
      }
      return direction === "asc" ? comparison : -comparison;
    }

    function applySort(columnIndex, direction, remember = true) {
      const table = root.querySelector(".research-table");
      const body = table?.tBodies[0];
      if (!table || !body) return;

      const rows = Array.from(body.rows).map((row, originalIndex) => ({
        row,
        originalIndex,
      }));
      rows.sort((itemA, itemB) => {
        const comparison = compareRows(
          itemA.row,
          itemB.row,
          columnIndex,
          direction,
        );
        return comparison || itemA.originalIndex - itemB.originalIndex;
      });
      rows.forEach(({ row }) => body.appendChild(row));

      table.querySelectorAll("th[aria-sort]").forEach((header) => {
        header.setAttribute("aria-sort", "none");
      });
      table.querySelectorAll(".is-active-sort").forEach((cell) => {
        cell.classList.remove("is-active-sort");
      });
      const header = table.tHead?.rows[0]?.cells[columnIndex];
      if (header) {
        header.setAttribute(
          "aria-sort",
          direction === "asc" ? "ascending" : "descending",
        );
        header.classList.add("is-active-sort");
      }
      Array.from(body.rows).forEach((row) => {
        row.cells[columnIndex]?.classList.add("is-active-sort");
      });
      if (remember) activeSort = { columnIndex, direction };
      updateRankCells();
    }

    function updateRankCells() {
      const table = root.querySelector(".research-table");
      const body = table?.tBodies[0];
      if (!body) return;

      Array.from(body.rows).forEach((row, index) => {
        row.querySelectorAll("[data-rank-cell]").forEach((cell) => {
          cell.textContent = String(index + 1);
          cell.dataset.sortValue = String(index + 1);
        });
      });
    }

    function localizeGameTimes() {
      root.querySelectorAll("[data-game-time-utc]").forEach((element) => {
        const gameTime = new Date(element.dataset.gameTimeUtc);
        if (Number.isNaN(gameTime.getTime())) return;

        element.textContent = new Intl.DateTimeFormat(undefined, {
          hour: "numeric",
          minute: "2-digit",
        }).format(gameTime);
        element.title = new Intl.DateTimeFormat(undefined, {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(gameTime);
      });
    }

    function checkOneTimeNotice(args) {
      const storageKey = args.local_storage_key;
      const storageValue = args.local_storage_value || "seen";
      const eventType = args.local_storage_event_type || "one_time_notice";
      if (!storageKey) return;

      try {
        if (window.localStorage.getItem(storageKey) === storageValue) return;
        window.localStorage.setItem(storageKey, storageValue);
        sendMessage("streamlit:setComponentValue", {
          dataType: "json",
          value: {
            type: eventType,
            event_id: `${Date.now()}-${Math.random()}`,
            storage_key: storageKey,
            storage_value: storageValue,
          },
        });
      } catch (error) {
        sendMessage("streamlit:setComponentValue", {
          dataType: "json",
          value: {
            type: eventType,
            event_id: `${Date.now()}-${Math.random()}`,
            storage_key: storageKey,
            storage_value: storageValue,
            storage_unavailable: true,
          },
        });
      }
    }

    function wireInteractions() {
      root.querySelectorAll(".research-sort-button").forEach((button) => {
        button.addEventListener("click", () => {
          const columnIndex = Number(button.dataset.columnIndex);
          const direction = (
            activeSort?.columnIndex === columnIndex
            && activeSort.direction === "asc"
          ) ? "desc" : "asc";
          applySort(columnIndex, direction);
        });
      });

      root.querySelectorAll("[data-research-event]").forEach((button) => {
        button.addEventListener("click", () => {
          const payload = JSON.parse(button.dataset.researchEvent);
          if (payload.view || payload.state_key) {
            button.closest(".app-tabs")?.querySelectorAll(".app-tab").forEach((tab) => {
              tab.classList.toggle("active", tab === button);
            });
          }
          sendMessage("streamlit:setComponentValue", {
            dataType: "json",
            value: {
              type: "select_player",
              event_id: `${Date.now()}-${Math.random()}`,
              payload,
            },
          });
        });
      });
    }

    function render(args) {
      root.innerHTML = args.table_html || "";
      checkOneTimeNotice(args);
      localizeGameTimes();
      useFullMobileHeight = Boolean(
        root.querySelector(".schedule-weather-table")
        || root.querySelector(".player-card-grid")
        || root.querySelector(".leaderboard-shell"),
      );
      requestedFrameHeight = Math.max(
        args.table_height || 542,
        root.scrollHeight || 0,
      );
      wireInteractions();
      if (activeSort) {
        applySort(
          activeSort.columnIndex,
          activeSort.direction,
          false,
        );
      }
      updateRankCells();
      setFrameHeight(requestedFrameHeight);
    }

    window.addEventListener("message", (event) => {
      if (event.data?.type === "streamlit:render") {
        render(event.data.args || {});
      }
    });

    window.addEventListener(
      "resize",
      () => setFrameHeight(requestedFrameHeight),
    );
    sendMessage("streamlit:componentReady", { apiVersion: 1 });
  </script>
</body>
</html>
