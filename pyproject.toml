[dependency-groups]
dev = [
  "mypy>=1.15,<2",
  "pytest>=9,<10",
  "ruff>=0.11,<1",
]

[tool.pytest.ini_options]
addopts = "-ra"
pythonpath = [".", "apps/api/src", "packages/backend/src", "services/worker/src"]
testpaths = ["tests"]

[tool.ruff]
target-version = "py312"
line-length = 100
extend-exclude = ["app.py"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_unused_configs = true
mypy_path = ["apps/api/src", "packages/backend/src", "services/worker/src"]
packages = ["all_rise", "all_rise_api", "all_rise_worker"]

[tool.uv.workspace]
members = ["apps/api", "packages/backend", "services/worker"]
