name: all-rise

x-app-environment: &app-environment
  APP_ENV: ${APP_ENV:-development}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  APP_TIMEZONE: ${APP_TIMEZONE:-America/Denver}
  DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://all_rise:all_rise@postgres:5432/all_rise}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  REDIS_CACHE_URL: ${REDIS_CACHE_URL:-redis://redis:6379/0}
  REDIS_BROKER_URL: ${REDIS_BROKER_URL:-redis://redis:6379/1}
  ARTIFACT_STORE: ${ARTIFACT_STORE:-local}
  ARTIFACT_LOCAL_ROOT: ${ARTIFACT_LOCAL_ROOT:-/var/lib/all-rise/artifacts}
  GCS_BUCKET: ${GCS_BUCKET:-}
  JOB_SOURCE_OWNERSHIP: ${JOB_SOURCE_OWNERSHIP:-shadow}
  JOB_ACTIVE_TASKS: ${JOB_ACTIVE_TASKS:-}
  JOB_STALE_AFTER_SECONDS: ${JOB_STALE_AFTER_SECONDS:-300}
  JOB_MAX_ATTEMPTS: ${JOB_MAX_ATTEMPTS:-5}
  SCHEMA_REVISION: ${SCHEMA_REVISION:-0003_durable_job_execution}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: all_rise
      POSTGRES_USER: all_rise
      POSTGRES_PASSWORD: all_rise
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U all_rise -d all_rise"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: ["alembic", "-c", "packages/backend/alembic.ini", "upgrade", "head"]
    environment: *app-environment
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      <<: *app-environment
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=2)"]
      interval: 10s
      timeout: 3s
      retries: 5

  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    environment: *app-environment
    volumes:
      - artifact-data:/var/lib/all-rise/artifacts
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/healthz').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 3s
      retries: 5

  streamlit-legacy:
    profiles: ["legacy"]
    build:
      context: .
      dockerfile: apps/streamlit-legacy/Dockerfile
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data

volumes:
  postgres-data:
  redis-data:
  artifact-data:
