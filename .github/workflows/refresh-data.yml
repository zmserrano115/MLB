name: Refresh MLB matchup data

on:
  schedule:
    # 1:30 PM Mountain Time - refresh today's slate
    - cron: "30 13 * * *"
      timezone: "America/Denver"

    # 11:30 PM Mountain Time - refresh tomorrow's slate
    - cron: "30 23 * * *"
      timezone: "America/Denver"

  workflow_dispatch:
    inputs:
      game_date:
        description: "Optional game date in YYYY-MM-DD format. Leave blank to use today's date."
        required: false
        type: string

      build_game_logs:
        description: "Build game logs?"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      max_game_logs:
        description: "Maximum game logs to build"
        required: true
        default: "100"
        type: string

      minimum_pa:
        description: "Minimum PA"
        required: true
        default: "100"
        type: string

permissions:
  contents: write

concurrency:
  group: refresh-mlb-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Choose refresh date
        shell: bash
        run: |
          MANUAL_GAME_DATE="${{ github.event.inputs.game_date }}"

          if [ -n "$MANUAL_GAME_DATE" ]; then
            GAME_DATE="$MANUAL_GAME_DATE"
            REFRESH_TYPE="manual custom date"

          elif [ "${{ github.event_name }}" = "schedule" ] && [ "${{ github.event.schedule }}" = "30 23 * * *" ]; then
            GAME_DATE=$(TZ="America/Denver" date -d "tomorrow" +"%Y-%m-%d")
            REFRESH_TYPE="scheduled 11:30 PM tomorrow slate"

          else
            GAME_DATE=$(TZ="America/Denver" date +"%Y-%m-%d")
            REFRESH_TYPE="scheduled/manual today slate"
          fi

          echo "GAME_DATE=$GAME_DATE" >> "$GITHUB_ENV"
          echo "REFRESH_TYPE=$REFRESH_TYPE" >> "$GITHUB_ENV"

          echo "Selected game date: $GAME_DATE"
          echo "Refresh type: $REFRESH_TYPE"

      - name: Refresh MLB data
        shell: bash
        run: |
          BUILD_GAME_LOGS="${{ github.event.inputs.build_game_logs }}"
          MAX_GAME_LOGS="${{ github.event.inputs.max_game_logs }}"
          MINIMUM_PA="${{ github.event.inputs.minimum_pa }}"

          if [ -z "$BUILD_GAME_LOGS" ]; then
            BUILD_GAME_LOGS="true"
          fi

          if [ -z "$MAX_GAME_LOGS" ]; then
            MAX_GAME_LOGS="100"
          fi

          if [ -z "$MINIMUM_PA" ]; then
            MINIMUM_PA="100"
          fi

          echo "Running refresh for game date: $GAME_DATE"
          echo "Build game logs: $BUILD_GAME_LOGS"
          echo "Max game logs: $MAX_GAME_LOGS"
          echo "Minimum PA: $MINIMUM_PA"

          if [ "$BUILD_GAME_LOGS" = "true" ]; then
            python refresh_nightly.py \
              --date "$GAME_DATE" \
              --min-pa "$MINIMUM_PA" \
              --build-game-logs \
              --max-game-logs "$MAX_GAME_LOGS"
          else
            python refresh_nightly.py \
              --date "$GAME_DATE" \
              --min-pa "$MINIMUM_PA" \
              --max-game-logs "$MAX_GAME_LOGS"
          fi

      - name: Commit refreshed data
        shell: bash
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git pull --rebase origin main

          git add data

          if git diff --cached --quiet; then
            echo "No refreshed data changes to commit."
          else
            git commit -m "Refresh MLB matchup data for $GAME_DATE"
            git push origin main
          fi