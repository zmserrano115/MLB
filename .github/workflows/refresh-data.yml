name: Refresh completed MLB games

on:
  push:
    branches:
      - main

  schedule:
    - cron: "30 3 * * *"
      timezone: "America/Denver"

  workflow_dispatch:
    inputs:
      game_date:
        description: "Last date to check (YYYY-MM-DD). Blank means yesterday."
        required: false
        type: string
      lookback_days:
        description: "Number of dates to recheck"
        required: true
        default: "3"
        type: string
      reprocess_existing:
        description: "Replace games already present in SQLite?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      test_only:
        description: "Run syntax/tests without calling StatsAPI?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

concurrency:
  group: refresh-mlb-database
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      TURSO_CONFIGURED: ${{ secrets.TURSO_DATABASE_URL != '' && 'true' || 'false' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests
        run: |
          python -m compileall -q app.py refresh_database.py refresh_nightly.py refresh_weather_cache.py backfill_database.py src tests
          python -m pytest -q

      - name: Download or build SQLite database
        if: ${{ github.event.inputs.test_only != 'true' && env.TURSO_CONFIGURED != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
          MLB_DB_SKIP_BOOTSTRAP: "1"
        run: |
          mkdir -p data
          if gh release view mlb-data >/dev/null 2>&1; then
            gh release download mlb-data --pattern mlb.db --dir data
          else
            python backfill_database.py \
              --start-season 2005 \
              --end-season 2025 \
              --db data/mlb.db \
              --sleep-seconds 0
          fi

      - name: Refresh final games
        if: ${{ github.event.inputs.test_only != 'true' }}
        shell: bash
        env:
          TURSO_DATABASE_URL: ${{ secrets.TURSO_DATABASE_URL }}
          TURSO_AUTH_TOKEN: ${{ secrets.TURSO_WRITE_AUTH_TOKEN }}
          TURSO_READ_ONLY: "0"
        run: |
          GAME_DATE="${{ github.event.inputs.game_date }}"
          LOOKBACK_DAYS="${{ github.event.inputs.lookback_days }}"
          REPROCESS="${{ github.event.inputs.reprocess_existing }}"
          EVENT_NAME="${{ github.event_name }}"

          if [ -z "$GAME_DATE" ]; then
            GAME_DATE=$(TZ="America/Denver" date -d "yesterday" +"%Y-%m-%d")
          fi

          ARGS=(--date "$GAME_DATE")
          if [ "$EVENT_NAME" = "push" ] && [ -z "$LOOKBACK_DAYS" ]; then
            ARGS+=(--season-to-date)
          else
            if [ -z "$LOOKBACK_DAYS" ]; then
              LOOKBACK_DAYS="3"
            fi
            ARGS+=(--lookback-days "$LOOKBACK_DAYS")
          fi

          if [ "$REPROCESS" = "true" ]; then
            ARGS+=(--reprocess-existing)
          fi

          python refresh_nightly.py "${ARGS[@]}"

      - name: Compress SQLite database
        if: ${{ github.event.inputs.test_only != 'true' && env.TURSO_CONFIGURED != 'true' }}
        run: gzip -c data/mlb.db > data/mlb.db.gz

      - name: Publish refreshed SQLite database
        if: ${{ github.event.inputs.test_only != 'true' && env.TURSO_CONFIGURED != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view mlb-data >/dev/null 2>&1; then
            gh release upload mlb-data data/mlb.db data/mlb.db.gz --clobber
          else
            gh release create mlb-data data/mlb.db data/mlb.db.gz \
              --title "MLB SQLite data" \
              --notes "Retrosheet 2005-2025 history plus completed current-season StatsAPI updates."
          fi
