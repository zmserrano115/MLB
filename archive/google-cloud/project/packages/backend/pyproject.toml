[project]
name = "all-rise-backend"
version = "0.1.0"
requires-python = ">=3.12,<3.13"
dependencies = [
  "alembic>=1.15,<2",
  "numpy>=2.2,<3",
  "pandas>=2.2,<4",
  "psycopg[binary]>=3.2,<4",
  "sqlalchemy>=2.0,<3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/all_rise"]
